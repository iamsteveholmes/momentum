# sprint-related to momentum-sprint-orchestration via epic-slug already set.
# Since we can only set one target_epic per disposition, use session-orientation
# as the primary re-home; stories already tagged to sub-features via feature_slug
# field will be handled by their existing epic assignments.
impetus-core:
  disposition: dissolve
  target_epic: momentum-impetus-session-orientation
  notes: >
