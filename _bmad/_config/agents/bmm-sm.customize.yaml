# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions: []

# Add persistent memories for the agent
memories:
  - "After completing a Create Story (CS) workflow, always run an AVFL validation pass on the generated story file before reporting it ready-for-dev. Use the avfl skill with: profile=checkpoint, stage=checkpoint, domain_expert='scrum master', source_material=the relevant epic section from _bmad-output/planning-artifacts/epics.md. This is mandatory — do not skip it and do not mark the story ready-for-dev until AVFL exits CLEAN or CHECKPOINT_WARNING."

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu:
  - trigger: VS
    action: avfl
    description: "[VS] Validate Story: Run AVFL checkpoint validation on a completed story before dev-story"

# Add custom prompts (for action="#id" handlers)
prompts: []
# Example:
# prompts:
# - id: my-prompt
#   content: |
#     Prompt instructions here
