# Categorical Epic Dispositions — B1 Migration (DEC-034 D2)
#
# For each categorical epic currently in stories/index.json that is NOT one of
# the 23 migrated features, this file declares the developer's per-epic disposition:
#
#   disposition: dissolve   — re-home all stories to `target_epic`; this epic disappears
#   disposition: long-lived — write into epics.json with lifecycle: long-lived
#
# Default disposition is dissolve. long-lived requires explicit justification in `notes`.
#
# Evaluated: 2026-05-28 (B1 migration sprint-2026-05-26)
# Reference: DEC-034 D2, AES-003

# ── ad-hoc ───────────────────────────────────────────────────────────────────
# Long-lived per DEC-034 D5 explicit: "ad-hoc accepts residue".
ad-hoc:
  disposition: long-lived
  name: "Ad-Hoc Work"
  description: >
    Canonical residue catcher. Accepts stories that don't belong to any specific
    finite-lived epic — quick fixes, tactical work, sprint-specific tasks, and
    stories that haven't been assigned to a deliverable epic yet.
  audience: internal
  notes: >
    Kept as long-lived per DEC-034 D2 and D5 explicit language. The canonical
    residue catcher: every sprint produces some ad-hoc work that doesn't fit a
    deliverable shape. Forcing it into a finite-lived epic would create artificial
    epics. Long-lived with no closure expectation.

